<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>마이 뮤직</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="마이뮤직">
<link rel="apple-touch-icon" href="mymusic-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="mymusic-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="mymusic-512.png">
<style>
  :root{
    --bg:#0a0a0a; --bg2:#161616; --bg3:#222; --line:#2a2a2a;
    --txt:#f2f2f2; --dim:#9a9a9a; --dim2:#6a6a6a;
    --red:#ff0033; --reddim:#cc0029;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100dvh;
    user-select:none;-webkit-user-select:none;}
  #header{flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 12px) 16px 6px;
    display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
  #header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;}
  #header h1 span{color:var(--red);}
  #headBtns{display:flex;gap:6px;}
  .iconBtn{width:40px;height:40px;border:none;background:var(--bg2);border-radius:50%;
    color:var(--txt);font-size:18px;display:flex;align-items:center;justify-content:center;}
  .iconBtn:active{background:var(--bg3);}
  /* 탭 — 크게, 터치 쉽게 */
  #tabs{flex:0 0 auto;display:flex;gap:8px;padding:6px 14px 12px;background:var(--bg);overflow-x:auto;}
  #tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;background:var(--bg2);border:none;border-radius:14px;color:var(--dim);
    font-size:15px;font-weight:700;padding:12px 20px;white-space:nowrap;transition:background .15s;}
  .tab.active{background:var(--red);color:#fff;}
  .tab:active{transform:scale(.96);}
  #content{flex:1 1 auto;overflow-y:auto;padding:6px 0 calc(env(safe-area-inset-bottom) + 20px);position:relative;}
  /* 세그먼트 (한국/미국 또는 전체/월간/주간) */
  .segBar{display:flex;gap:0;margin:4px 16px 10px;background:var(--bg2);border-radius:11px;padding:3px;}
  .segBtn{flex:1;background:none;border:none;color:var(--dim);font-size:14px;font-weight:600;padding:9px 0;border-radius:9px;}
  .segBtn.active{background:var(--red);color:#fff;}
  #swipeHint{text-align:center;font-size:11px;color:var(--dim2);padding-bottom:8px;}
  .chartTop{margin:0 16px 12px;border-radius:16px;overflow:hidden;position:relative;
    background:var(--bg2);display:flex;flex-direction:column;}
  .chartTop .ctImg{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg3);}
  .chartTop .ctInfo{padding:12px 14px;}
  .chartTop .ctRank{display:inline-block;background:var(--red);color:#fff;font-size:12px;
    font-weight:800;padding:3px 9px;border-radius:6px;margin-bottom:7px;}
  .chartTop .ctTitle{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:3px;}
  .chartTop .ctArtist{font-size:13px;color:var(--dim);}
  .rankRow{display:flex;align-items:center;gap:12px;padding:8px 16px;}
  .rankRow:active{background:var(--bg2);}
  .rankNum{flex:0 0 24px;text-align:center;font-size:16px;font-weight:700;color:var(--dim);}
  .rankNum.top{color:var(--red);}
  .rankThumb{flex:0 0 52px;width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--bg3);}
  .rankInfo{flex:1;min-width:0;}
  .rankTitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rankArtist{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .rankCount{flex:0 0 auto;font-size:11px;color:var(--dim2);background:var(--bg2);padding:3px 8px;border-radius:10px;}
  /* 재생 버튼 3종 — 유튜브 / 유튜브 뮤직 / 이 화면에서 재생 */
  .btnPair{flex:0 0 auto;display:flex;align-items:center;gap:5px;}
  .bYT,.bYM,.bIN{width:34px;height:34px;border-radius:50%;border:none;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .bYT{background:var(--red);color:#fff;font-size:13px;padding-left:2px;}
  .bYT:active{background:var(--reddim);transform:scale(.9);}
  .bYM{background:#fff;font-size:16px;box-shadow:0 0 0 2px rgba(255,255,255,.18);}
  .bYM:active{transform:scale(.9);}
  .bIN{background:var(--bg3);color:#fff;border:1.5px solid var(--red);font-size:15px;}
  .bIN:active{background:var(--red);transform:scale(.9);}
  /* 곡 상세 시트 */
  #dtSheet{position:fixed;inset:0;z-index:45;background:var(--bg);display:none;flex-direction:column;
    padding-top:env(safe-area-inset-top);}
  #dtSheet.show{display:flex;}
  #dtHead{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
  #dtHead .pmBack{border:none;background:none;color:var(--txt);font-size:26px;line-height:1;}
  #dtHead .pmTitle{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #dtBody{flex:1;overflow-y:auto;padding:0 0 calc(env(safe-area-inset-bottom) + 20px);}
  .dtImg{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg3);}
  .dtWrap{padding:14px 16px;}
  .dtTitle{font-size:18px;font-weight:800;line-height:1.35;}
  .dtArtist{font-size:14px;color:var(--dim);margin-top:5px;}
  .dtMeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .dtChip{font-size:11px;color:var(--dim);background:var(--bg2);padding:5px 10px;border-radius:9px;}
  .dtActs{display:flex;gap:7px;margin-top:16px;}
  .dtBtn{flex:1;border:none;border-radius:12px;font-size:13px;font-weight:700;padding:13px 4px;
    display:flex;align-items:center;justify-content:center;gap:5px;}
  .dtBtn.yt{background:var(--red);color:#fff;}
  .dtBtn.yt:active{background:var(--reddim);}
  .dtBtn.ym{background:#fff;color:#111;}
  .dtBtn.ym:active{background:#ddd;}
  .dtBtn.inside{background:var(--bg3);color:#fff;border:1px solid var(--red);}
  .dtBtn.inside:active{background:var(--red);}
  .dtDescT{font-size:12px;color:var(--dim2);font-weight:700;margin:22px 0 7px;}
  /* 화면 안 재생용 YouTube 플레이어 */
  #inPlayer{position:fixed;z-index:48;left:50%;bottom:calc(env(safe-area-inset-bottom) + 10px);
    width:min(calc(100vw - 20px),520px);transform:translate(-50%,calc(100% + 30px));
    background:#111;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 14px 42px rgba(0,0,0,.65);opacity:0;pointer-events:none;
    transition:transform .25s ease,opacity .2s ease;}
  #inPlayer.show{transform:translate(-50%,0);opacity:1;pointer-events:auto;}
  #inPlayerHead{height:48px;display:flex;align-items:center;gap:10px;padding:7px 8px 7px 13px;
    background:var(--bg2);border-bottom:1px solid var(--line);}
  #inPlayerText{flex:1;min-width:0;}
  #inPlayerTitle{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #inPlayerArtist{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  #inPlayerClose{flex:0 0 34px;width:34px;height:34px;border:none;border-radius:50%;
    background:var(--bg3);color:#fff;font-size:22px;line-height:1;}
  #inPlayerClose:active{background:var(--red);}
  #inPlayerFrameWrap{width:100%;height:clamp(200px,56.25vw,270px);background:#000;}
  #inPlayerFrame{display:block;width:100%;height:100%;border:0;}
  /* 달력 전체화면 시트 */
  #calSheet{position:fixed;inset:0;z-index:44;background:var(--bg);display:none;flex-direction:column;
    padding-top:env(safe-area-inset-top);}
  #calSheet.show{display:flex;}
  .calSheetHead{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
  #calSheetBody{flex:1;overflow-y:auto;padding:14px 0 calc(env(safe-area-inset-bottom) + 20px);}
  /* 달력 보기 (연간/월간/주간) */
  .calWrap{background:var(--bg2);border-radius:14px;margin:0 12px 6px;padding:12px;}
  .calHead{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;}
  .calHead .sub{font-size:10px;color:var(--dim2);font-weight:600;}
  .calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .calDow{font-size:10px;color:var(--dim2);text-align:center;font-weight:700;padding:2px 0;}
  .calCell{aspect-ratio:1;border-radius:8px;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:11px;color:var(--dim);}
  .calCell.on{color:#fff;font-weight:700;}
  .calCell.empty{background:none;}
  .calCell.today{box-shadow:0 0 0 1.5px var(--red) inset;}
  .calCell.sel{box-shadow:0 0 0 2px #fff inset;}
  .calCell .cnt{font-size:8px;font-weight:700;opacity:.9;}
  .calGridY{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .calCellY{aspect-ratio:1.5;border-radius:9px;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:12px;color:var(--dim);}
  .calCellY.on{color:#fff;font-weight:800;}
  .calCellY .cnt{font-size:9px;font-weight:700;opacity:.9;}
  .weekDayRow{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);align-items:flex-start;}
  .weekDayRow:last-child{border-bottom:none;}
  .wdLabel{flex:0 0 54px;font-size:11px;font-weight:800;color:var(--dim);padding-top:4px;}
  .wdLabel.today{color:var(--red);}
  .wdSongs{flex:1;display:flex;flex-wrap:wrap;gap:5px;min-width:0;}
  .gChip{font-size:10px;padding:4px 8px;border-radius:7px;color:#fff;font-weight:600;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wdNone{font-size:11px;color:var(--dim2);padding-top:5px;}
  .legend{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px;}
  .legend span{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}
  .calSecT{font-size:12px;color:var(--dim2);font-weight:800;margin:14px 14px 8px;}
  .dtDesc{font-size:13px;color:var(--dim);line-height:1.65;white-space:pre-wrap;word-break:break-word;
    background:var(--bg2);border-radius:12px;padding:13px 14px;user-select:text;-webkit-user-select:text;}
  .plGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:8px 16px;}
  .sortBar{display:flex;justify-content:flex-end;padding:6px 16px 0;}
  .sortBtn{background:var(--bg2);border:none;color:var(--dim);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;}
  .sortBtn .si{font-size:13px;}
  .plCard .pcImg{width:100%;aspect-ratio:1;border-radius:12px;object-fit:cover;background:var(--bg3);
    display:flex;align-items:center;justify-content:center;font-size:40px;}
  .plCard .pcTitle{font-size:14px;font-weight:600;margin-top:8px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .plCard .pcSub{font-size:12px;color:var(--dim);margin-top:3px;}
  .secLoading{padding:30px 16px;color:var(--dim);font-size:14px;text-align:center;}
  .secError{margin:16px;padding:16px;background:var(--bg2);border-radius:12px;
    color:var(--dim);font-size:13px;line-height:1.7;text-align:center;}
  .secError b{color:var(--red);}
  .emptyMsg{padding:50px 24px;text-align:center;color:var(--dim);font-size:14px;line-height:1.8;}
  .emptyMsg .big{font-size:40px;margin-bottom:12px;}
  #plModal{position:fixed;inset:0;z-index:40;background:var(--bg);display:none;flex-direction:column;
    padding-top:env(safe-area-inset-top);}
  #plModal.show{display:flex;}
  #plModalHead{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
  #plModalHead .pmBack{border:none;background:none;color:var(--txt);font-size:26px;line-height:1;}
  #plModalHead .pmTitle{flex:1;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #plModalHead .pmOpen{border:none;font-size:12px;color:#fff;background:var(--red);font-weight:600;padding:7px 12px;border-radius:8px;}
  #plModalList{flex:1;overflow-y:auto;padding:6px 0 calc(env(safe-area-inset-bottom) + 16px);}
  #setModal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.96);display:none;
    flex-direction:column;padding:env(safe-area-inset-top) 0 0;}
  #setModal.show{display:flex;}
  #setHead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);}
  #setHead h2{font-size:18px;font-weight:700;}
  #setHead button{border:none;background:none;color:var(--txt);font-size:24px;}
  #setBody{flex:1;overflow-y:auto;padding:16px;}
  .setLabel{font-size:13px;color:var(--dim);margin:22px 0 6px;font-weight:600;}
  .setLabel:first-child{margin-top:0;}
  .setInput{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);font-size:14px;padding:11px 13px;outline:none;}
  .setInput:focus{border-color:var(--red);}
  .setHelp{font-size:11px;color:var(--dim2);margin-top:6px;line-height:1.6;}
  .setBtn{width:100%;background:var(--red);border:none;border-radius:10px;color:#fff;
    font-size:15px;font-weight:700;padding:13px 0;margin-top:12px;}
  .setBtn:active{background:var(--reddim);}
  .setBtn.sec{background:var(--bg2);color:var(--txt);}
  .setBtn.danger{background:var(--bg2);color:var(--red);}
  .plAddRow{display:flex;gap:8px;margin-top:8px;}
  .plAddRow .setInput{flex:1;}
  .plAddRow button{flex:0 0 auto;background:var(--bg3);border:none;border-radius:10px;color:var(--txt);
    font-size:13px;font-weight:600;padding:0 14px;}
  .savedPl{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:10px;
    padding:10px 12px;margin-top:8px;}
  .savedPl .spName{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .savedPl .spDel{border:none;background:none;color:var(--dim);font-size:18px;}
  #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translateX(-50%) translateY(20px);
    background:var(--bg3);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:500;
    padding:10px 18px;border-radius:20px;opacity:0;transition:all .25s;z-index:60;pointer-events:none;white-space:nowrap;max-width:90vw;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div id="header">
    <h1>마이 <span>뮤직</span></h1>
    <div id="headBtns">
      <button class="iconBtn" id="refreshBtn" title="새로고침">⟳</button>
      <button class="iconBtn" id="setBtn" title="설정">⚙</button>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="chart">순위</button>
    <button class="tab" data-tab="mychart">내 순위</button>
    <button class="tab" data-tab="my">내 음악</button>
    <button class="tab" data-tab="official">추천</button>
    <button class="tab" data-tab="period">기간별</button>
  </div>
  <div id="content"></div>
  <div id="plModal">
    <div id="plModalHead">
      <button class="pmBack" id="plModalClose">‹</button>
      <span class="pmTitle" id="pmTitle">재생목록</span>
      <button class="pmOpen" id="pmOpen">📃 재생목록</button>
    </div>
    <div id="plSortBar" class="sortBar" style="display:none;"><button class="sortBtn" id="songSortBtn"><span class="si">↕</span>원래순</button></div>
    <div id="plModalList"></div>
  </div>
  <div id="dtSheet">
    <div id="dtHead">
      <button class="pmBack" id="dtClose">‹</button>
      <div class="pmTitle">곡 정보</div>
    </div>
    <div id="dtBody"></div>
  </div>
  <div id="calSheet">
    <div class="calSheetHead">
      <button class="pmBack" id="calClose">‹</button>
      <div class="pmTitle" id="calSheetTitle">달력</div>
    </div>
    <div id="calSheetBody"></div>
  </div>
  <div id="setModal">
    <div id="setHead"><h2>설정</h2><button id="setClose">×</button></div>
    <div id="setBody">
      <div class="setLabel">YouTube API 키</div>
      <input class="setInput" id="apiKeyInput" type="text" placeholder="여기에 API 키 붙여넣기" autocomplete="off" autocorrect="off" autocapitalize="off">
      <div class="setHelp">구글 클라우드에서 발급받은 키예요. 한 번 넣으면 이 폰에 저장됩니다.</div>
      <button class="setBtn" id="saveKeyBtn">키 저장</button>
      <div class="setLabel">⭐ 내 음악 재생목록</div>
      <div class="plAddRow"><input class="setInput" id="myPlInput" type="text" placeholder="재생목록 링크 붙여넣기" autocomplete="off"><button id="myPlAdd">추가</button></div>
      <div id="myPlList"></div>
      <div class="setLabel">🎵 추천 재생목록</div>
      <div class="plAddRow"><input class="setInput" id="offPlInput" type="text" placeholder="재생목록 링크 붙여넣기" autocomplete="off"><button id="offPlAdd">추가</button></div>
      <div id="offPlList"></div>
      <div class="setLabel">📅 기간별 재생목록</div>
      <div class="plAddRow"><input class="setInput" id="perPlInput" type="text" placeholder="재생목록 링크 붙여넣기" autocomplete="off"><button id="perPlAdd">추가</button></div>
      <div id="perPlList"></div>
      <div class="setLabel">🏆 내 순위 기록</div>
      <div class="setHelp">곡을 누를 때마다 자동으로 기록돼서 '내 순위' 탭에 쌓여요.</div>
      <button class="setBtn danger" id="clearHistBtn" style="margin-top:10px;">내 순위 기록 초기화</button>

      <div class="setLabel">💾 백업 / 복원</div>
      <div class="setHelp">앱을 지우기 전에 <b>내보내기</b>로 재생목록을 복사해 메모장에 붙여두세요. 새로 깔면 <b>가져오기</b>로 그대로 복원됩니다.</div>
      <button class="setBtn sec" id="exportBtn" style="margin-top:10px;">📤 내보내기 (복사)</button>
      <textarea class="setInput" id="backupBox" placeholder="여기에 백업 내용이 나와요. 복원할 땐 저장해둔 내용을 여기 붙여넣고 '가져오기'를 누르세요." style="min-height:90px;margin-top:10px;font-size:12px;font-family:monospace;"></textarea>
      <button class="setBtn" id="importBtn" style="margin-top:10px;">📥 가져오기 (복원)</button>

      <button class="setBtn sec" id="reloadBtn" style="margin-top:22px;">변경사항 적용</button>
    </div>
  </div>
  <div id="inPlayer" aria-hidden="true">
    <div id="inPlayerHead">
      <div id="inPlayerText">
        <div id="inPlayerTitle">재생 중</div>
        <div id="inPlayerArtist"></div>
      </div>
      <button id="inPlayerClose" title="재생 닫기" aria-label="재생 닫기">×</button>
    </div>
    <div id="inPlayerFrameWrap">
      <iframe id="inPlayerFrame" title="YouTube 내부 재생" src="about:blank"
        allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
  </div>
  <div id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const Store=(()=>{
  let mem={}; let useLS=true;
  try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); }catch(e){ useLS=false; }
  return {
    get(k,def){
      try{ if(useLS){ const v=localStorage.getItem(k); return v===null?def:JSON.parse(v); } }catch(e){}
      return (k in mem)?mem[k]:def;
    },
    set(k,v){
      try{ if(useLS){ localStorage.setItem(k,JSON.stringify(v)); return; } }catch(e){}
      mem[k]=v;
    }
  };
})();

/* ===== 장르: 재생목록 이름 뒤 숫자를 뺀 것 (예: '댄스 1990' -> 댄스) ===== */
function genreFromTitle(t){
  if(!t) return '';
  const g=String(t).replace(/[0-9\s]+$/,'').trim();
  return g||String(t).trim();
}
const GENRE_COLORS={'댄스':'#fb923c','발라드':'#60a5fa','EDM':'#a78bfa','록':'#f87171','인디':'#34d399','힙합':'#facc15'};
function colorFor(g){
  if(!g) return '#5b5b5b'; // 기타(출처 모름)
  if(GENRE_COLORS[g]) return GENRE_COLORS[g];
  let h=0; for(let i=0;i<g.length;i++) h=(h*31+g.charCodeAt(i))>>>0;
  return 'hsl('+(h%360)+' 55% 52%)';
}
/* 기간 시작: 주간=이번주 월요일 0시 / 월간=이달 1일 / 연간=올해 1월 1일 */
function periodStart(period){
  const d=new Date();
  if(period==='week'){ const dow=(d.getDay()+6)%7; return new Date(d.getFullYear(),d.getMonth(),d.getDate()-dow).getTime(); }
  if(period==='month') return new Date(d.getFullYear(),d.getMonth(),1).getTime();
  return new Date(d.getFullYear(),0,1).getTime();
}

/* history = [{vid,title,artist,thumb,times:[ts,ts,...]}] */
function getHistory(){ return Store.get('playHistory', []); }
/* 1년 지난 재생 기록 자동 삭제 (앱 켤 때마다 정리) */
const HIST_KEEP_MS=365*24*3600*1000;
function pruneHistory(){
  const cutoff=Date.now()-HIST_KEEP_MS;
  const hist=getHistory();
  let changed=false;
  const pruned=hist.map(h=>{
    const t=(h.times||[]).filter(ts=>ts>=cutoff);
    if(t.length!==(h.times||[]).length) changed=true;
    return {...h, times:t};
  }).filter(h=>h.times.length>0);
  if(changed||pruned.length!==hist.length) Store.set('playHistory', pruned);
}
function recordPlay(vid,title,artist,thumb,genre){
  if(!vid)return;
  const hist=getHistory();
  let e=hist.find(h=>h.vid===vid);
  if(!e){ e={vid,title,artist,thumb,times:[]}; hist.push(e); }
  e.title=title; e.artist=artist; e.thumb=thumb; // 최신 정보로 갱신
  if(genre) e.genre=genre; // 장르 = 재생목록 이름(숫자 제거)
  e.times.push(Date.now());
  Store.set('playHistory', hist);
}
/* 기간 내 재생 이벤트 목록 */
function playsBetween(a,b){
  const out=[];
  getHistory().forEach(h=>(h.times||[]).forEach(t=>{
    if(t>=a&&t<b) out.push({ts:t,vid:h.vid,title:h.title,artist:h.artist,thumb:h.thumb,genre:h.genre||''});
  }));
  out.sort((x,y)=>x.ts-y.ts);
  return out;
}
function domColor(plays){
  if(!plays.length) return null;
  const c={}; plays.forEach(p=>{ c[p.genre]=(c[p.genre]||0)+1; });
  let best='',bn=-1; for(const k in c){ if(c[k]>bn){bn=c[k];best=k;} }
  return colorFor(best);
}
function legendHtml(plays){
  const set={}; plays.forEach(p=>{ set[p.genre||'']=1; });
  const keys=Object.keys(set);
  if(!keys.length) return '';
  return '<div class="legend">'+keys.map(g=>'<span><i style="background:'+colorFor(g)+'"></i>'+(g?esc(g):'기타')+'</span>').join('')+'</div>';
}
function rankByPeriod(period){
  const since=periodStart(period);
  const hist=getHistory();
  const arr=hist.map(h=>{
    const cnt=h.times.filter(t=>t>=since).length;
    return {...h, count:cnt};
  }).filter(h=>h.count>0);
  arr.sort((a,b)=>b.count-a.count);
  return arr;
}

const API='https://www.googleapis.com/youtube/v3/';
async function ytFetch(endpoint, params){
  const key=getApiKey();
  if(!key) throw {noKey:true};
  const url=API+endpoint+'?'+new URLSearchParams({...params, key}).toString();
  const res=await fetch(url);
  const data=await res.json();
  if(data.error){ throw {api:data.error}; }
  return data;
}

/* ===== 내 순위 ===== */
function calWeekHtml(){
  const start=periodStart('week');
  const today=new Date(); today.setHours(0,0,0,0);
  const names=['월','화','수','목','금','토','일'];
  let rows='';
  for(let i=0;i<7;i++){
    const d0=new Date(start+i*86400000);
    const a=d0.getTime(), b=a+86400000;
    const plays=playsBetween(a,b);
    const isToday=a===today.getTime();
    const future=a>today.getTime();
    let chips;
    if(plays.length) chips=plays.map(pl=>'<span class="gChip" style="background:'+colorFor(pl.genre)+'">'+esc(pl.title)+'</span>').join('');
    else chips='<span class="wdNone">'+(future?'-':'없음')+'</span>';
    rows+='<div class="weekDayRow"><div class="wdLabel'+(isToday?' today':'')+'">'+names[i]+' '+(d0.getMonth()+1)+'/'+d0.getDate()+'</div><div class="wdSongs">'+chips+'</div></div>';
  }
  const all=playsBetween(start,start+7*86400000);
  return '<div class="calWrap"><div class="calHead">이번 주 들은 노래<span class="sub">월~일</span></div>'+rows+legendHtml(all)+'</div>';
}
function calMonthHtml(){
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const first=new Date(y,m,1);
  const lead=(first.getDay()+6)%7; // 월요일 시작
  const days=new Date(y,m+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  let cells='<div class="calGrid">';
  ['월','화','수','목','금','토','일'].forEach(n=>{ cells+='<div class="calDow">'+n+'</div>'; });
  for(let i=0;i<lead;i++) cells+='<div class="calCell empty"></div>';
  for(let d=1;d<=days;d++){
    const a=new Date(y,m,d).getTime(), b=a+86400000;
    const plays=playsBetween(a,b);
    const col=domColor(plays);
    const isToday=a===today.getTime();
    cells+='<div class="calCell'+(col?' on':'')+(isToday?' today':'')+'" data-day="'+d+'"'+(col?' style="background:'+col+'"':'')+'>'+d+(plays.length?'<span class="cnt">'+plays.length+'</span>':'')+'</div>';
  }
  cells+='</div>';
  const all=playsBetween(new Date(y,m,1).getTime(), new Date(y,m+1,1).getTime());
  return '<div class="calWrap"><div class="calHead">'+(m+1)+'월 달력<span class="sub">날짜를 누르면 그날 들은 노래</span></div>'+cells+legendHtml(all)+'<div id="calDayList"></div></div>';
}
function calYearHtml(){
  const y=new Date().getFullYear();
  let cells='<div class="calGridY">';
  for(let m=0;m<12;m++){
    const a=new Date(y,m,1).getTime(), b=new Date(y,m+1,1).getTime();
    const plays=playsBetween(a,b);
    const col=domColor(plays);
    cells+='<div class="calCellY'+(col?' on':'')+'"'+(col?' style="background:'+col+'"':'')+'>'+(m+1)+'월'+(plays.length?'<span class="cnt">'+plays.length+'곡</span>':'')+'</div>';
  }
  cells+='</div>';
  const all=playsBetween(new Date(y,0,1).getTime(), new Date(y+1,0,1).getTime());
  return '<div class="calWrap"><div class="calHead">'+y+'년<span class="sub">1~12월 · 색 = 가장 많이 들은 장르</span></div>'+cells+legendHtml(all)+'</div>';
}
/* 달력 화면 (전체화면 시트, 좌우 슬라이드로 복귀) */
function openCalSheet(period){
  const body=$('calSheetBody');
  if(period==='week'){ $('calSheetTitle').textContent='주간 달력'; body.innerHTML=calWeekHtml(); }
  else if(period==='month'){ $('calSheetTitle').textContent='월간 달력'; body.innerHTML=calMonthHtml(); }
  else { $('calSheetTitle').textContent='연간 달력'; body.innerHTML=calYearHtml(); }
  body.scrollTop=0;
  // 월간: 날짜 탭 -> 그날 들은 노래
  if(period==='month'){
    body.querySelectorAll('.calCell[data-day]').forEach(cell=>cell.addEventListener('click',()=>{
      const wasSel=cell.classList.contains('sel');
      body.querySelectorAll('.calCell.sel').forEach(x=>x.classList.remove('sel'));
      const list=$('calDayList');
      if(wasSel){ list.innerHTML=''; return; }
      cell.classList.add('sel');
      const now=new Date();
      const a=new Date(now.getFullYear(),now.getMonth(),parseInt(cell.dataset.day,10)).getTime();
      const plays=playsBetween(a,a+86400000);
      if(!plays.length){ list.innerHTML='<div class="wdNone" style="padding:10px 2px 4px;">이날은 들은 노래가 없어요.</div>'; return; }
      const uniq=[];
      plays.forEach(pl=>{
        let u=uniq.find(x=>x.vid===pl.vid);
        if(!u){ u={...pl,count:0}; uniq.push(u); }
        u.count++;
      });
      list.innerHTML='<div style="height:10px"></div>'+uniq.map((u,i)=>rowHtmlCount(i+1,u.vid,u.title,u.artist,u.thumb,u.count)).join('');
    }));
  }
  $('calSheet').classList.add('show');
}

function getGridSort(){

  return typeof v==='string' ? {mode:'name',desc:false} : v; // 예전 저장값(추가순 등)은 이름순으로
}
/* 폴더를 마지막으로 연 시간 (들은순 기준) */
function plUsedAt(plid){ const u=Store.get('plUsed',{}); return u[plid]||0; }
function markPlUsed(plid){ const u=Store.get('plUsed',{}); u[plid]=Date.now(); Store.set('plUsed',u); }
function sortGridItems(items, pls, st){
  const arr=items.slice();
  if(st.mode==='used') arr.sort((a,b)=>plUsedAt(b.id)-plUsedAt(a.id)); // 최근 들은 폴더부터
  else arr.sort((a,b)=>(a.snippet.title||'').localeCompare(b.snippet.title||'','ko')); // 이름순 ㄱ→ㅎ
  if(st.desc) arr.reverse();
  return arr;
}
function gridSortLabel(st){
  return st.mode==='used'
    ? (st.desc?'🎧 들은순 ▲ 안 들은 폴더부터':'🎧 들은순 ▼ 최근 들은 폴더부터')
    : (st.desc?'🔤 이름순 ▲ ㅎ→ㄱ':'🔤 이름순 ▼ ㄱ→ㅎ');
}
async function renderPlaylistGrid(pls, label){

  if(!pls || pls.length===0){ c.innerHTML='<div class="emptyMsg"><div class="big">📂</div>'+label+'에 재생목록이 없어요.<br><b style="color:var(--red)">⚙ 설정</b>에서 링크를 추가하세요.</div>'; return; }
  c.innerHTML='<div class="secLoading">불러오는 중…</div>';
  try{
    const ids=pls.map(p=>extractPlaylistId(p.url)).filter(Boolean);
    if(ids.length===0){ c.innerHTML='<div class="secError">재생목록 링크를 인식하지 못했어요.</div>'; return; }
    const data=await ytFetch('playlists',{ part:'snippet,contentDetails', id:ids.join(','), maxResults:'50' });
    const items=data.items||[];
    if(items.length===0){ c.innerHTML='<div class="secError">재생목록을 찾지 못했어요. (비공개이거나 자동 생성 목록일 수 있어요)</div>'; return; }
    const sorted=sortGridItems(items, pls, getGridSort());
    let html='<div class="sortBar"><button class="sortBtn" id="gridSortBtn"><span class="si">↕</span>'+gridSortLabel(getGridSort())+'</button></div>';
    html+='<div class="plGrid">';
    sorted.forEach(it=>{
      const sn=it.snippet;
      const thumb=(sn.thumbnails.high||sn.thumbnails.medium||sn.thumbnails.default||{}).url||'';
      const count=it.contentDetails?it.contentDetails.itemCount:'';
      html+='<div class="plCard" data-plid="'+it.id+'" data-title="'+esc(sn.title)+'"><img class="pcImg" src="'+thumb+'" loading="lazy"><div class="pcTitle">'+esc(sn.title)+'</div><div class="pcSub">'+count+'곡</div></div>';
    });
    html+='</div>';
    c.innerHTML=html;
    const btn=$('gridSortBtn');
    if(btn) btn.addEventListener('click',()=>{
      // 이름순▼ -> 이름순▲ -> 들은순▼ -> 들은순▲ -> 이름순▼ …
      const st=getGridSort();
      let next;
      if(!st.desc) next={mode:st.mode,desc:true};
      else next={mode:st.mode==='name'?'used':'name',desc:false};
      Store.set('gridSort',next); renderTab();
    });
  }catch(err){ c.innerHTML=errorHtml(err); }
}
let curSongs=[]; // 현재 모달에 열린 곡들 (원래순)
/* 정렬: 같은 버튼을 또 누르면 방향이 뒤집힘 (▼/▲) */
function getSongSort(){
  const v=Store.get('songSort','orig');
  return typeof v==='string' ? {mode:v,desc:false} : v; // 예전 저장값 호환
}
function lastPlayedAt(vid){
  const h=getHistory().find(x=>x.vid===vid);
  return h&&h.times&&h.times.length ? h.times[h.times.length-1] : 0; // 0 = 들은 적 없음
}
function renderSongList(){
  const st=getSongSort();
  let arr=curSongs.slice();
  if(st.mode==='artist') arr.sort((a,b)=>(a.artist||'').localeCompare(b.artist||'','ko'));
  else if(st.mode==='played') arr.sort((a,b)=>lastPlayedAt(b.vid)-lastPlayedAt(a.vid)); // 최근 들은 순
  if(st.desc) arr.reverse();
  let html='';
  arr.forEach((s,i)=>{
    // rowHtml에 data-pos(원래 재생목록 위치) 주입
    html+=rowHtml(i+1,s.vid,s.title,s.artist,s.thumb).replace('class="rankRow"','class="rankRow" data-pos="'+s.pos+'"');
  });
  $('plModalList').innerHTML=html||'<div class="secError">곡을 찾지 못했어요.</div>';
  // 버튼 표시: 모드 이름 + 현재 방향 설명
  const names={
    orig:  st.desc?'원래순 ▲ 늦게 추가':'원래순 ▼ 먼저 추가',
    artist:st.desc?'🎤 가수순 ▲ ㅎ→ㄱ':'🎤 가수순 ▼ ㄱ→ㅎ',
    played:st.desc?'🎧 들은순 ▲ 안 들은 곡부터':'🎧 들은순 ▼ 최근 들은 곡부터'
  };
  $('songSortBtn').innerHTML='<span class="si">↕</span>'+names[st.mode];
}
let curPlGenre='';
async function openPlaylist(plid, title){
  $('pmTitle').textContent=title||'재생목록';
  curPlGenre=genreFromTitle(title||''); // 이 목록에서 튼 곡의 장르
  markPlUsed(plid); // 들은순 정렬용: 이 폴더를 연 시간 기록
  $('pmOpen').dataset.plid=plid;
  $('plSortBar').style.display='none';
  curSongs=[];
  $('plModalList').innerHTML='<div class="secLoading">곡 불러오는 중…</div>';
  $('plModal').classList.add('show');
  try{
    let all=[], pageToken='';
    for(let p=0;p<10;p++){
      const data=await ytFetch('playlistItems',{ part:'snippet', playlistId:plid, maxResults:'50', ...(pageToken?{pageToken}:{}) });
      all=all.concat(data.items||[]);
      if(!data.nextPageToken) break;
      pageToken=data.nextPageToken;
    }
    if(all.length===0){ $('plModalList').innerHTML='<div class="secError">곡을 찾지 못했어요.</div>'; return; }
    curSongs=all.map(it=>{
      const sn=it.snippet; if(!sn||!sn.resourceId) return null;
      return {
        vid:sn.resourceId.videoId,
        thumb:(sn.thumbnails && (sn.thumbnails.default||sn.thumbnails.medium)||{}).url||'',
        title:cleanTitle(sn.title),
        artist:(sn.videoOwnerChannelTitle||'').replace(/ - Topic$/,''),
        pos:(typeof sn.position==='number'?sn.position:0) // 재생목록 내 원래 위치(0부터)
      };
    }).filter(Boolean);
    $('plSortBar').style.display='flex';
    renderSongList();
  }catch(err){ $('plModalList').innerHTML=errorHtml(err); }
}
function openPlaylistInMusic(plid){ window.location.href='https://www.youtube.com/playlist?list='+plid; }

/* ===== 곡 상세 시트 ===== */
function goYT(vid,plid){ let u='https://www.youtube.com/watch?v='+vid; if(plid)u+='&list='+plid; window.location.href=u; }
function goYM(vid){ window.location.href='https://music.youtube.com/watch?v='+vid; }
function playInside(vid,title,artist,plid){
  if(!vid)return;
  const params=['autoplay=1','playsinline=1','rel=0'];
  if(plid){ params.push('listType=playlist','list='+encodeURIComponent(plid)); }
  $('inPlayerTitle').textContent=title||'재생 중';
  $('inPlayerArtist').textContent=artist||'';
  $('inPlayerFrame').src='https://www.youtube.com/embed/'+encodeURIComponent(vid)+'?'+params.join('&');
  $('inPlayer').classList.add('show');
  $('inPlayer').setAttribute('aria-hidden','false');
}
function closeInsidePlayer(){
  $('inPlayer').classList.remove('show');
  $('inPlayer').setAttribute('aria-hidden','true');
  $('inPlayerFrame').src='about:blank'; // 닫으면 재생도 정지
}
$('inPlayerClose').addEventListener('click',closeInsidePlayer);
function ctxPlid(el){
  if(el && el.closest('#plModalList')) return $('pmOpen').dataset.plid||'';
  if(currentTab==='chart') return CHART_PL[getRegion()]||'';
  return '';
}
function ctxGenre(el){
  // 내 음악 재생목록 안에서 튼 곡만 장르를 알 수 있음
  return (el && el.closest('#plModalList')) ? curPlGenre : '';
}
function fmtNum(n){
  n=parseInt(n||0,10);
  if(n>=100000000) return Math.floor(n/100000000)+'억회';
  if(n>=10000) return Math.floor(n/10000)+'만회';
  return n.toLocaleString('ko')+'회';
}
let dtCur=null;
async function openDetail(vid,title,artist,thumb,plid,genre){
  dtCur={vid,title,artist,thumb,plid,genre:genre||''};
  const head='<img class="dtImg" src="https://i.ytimg.com/vi/'+vid+'/hqdefault.jpg" onerror="this.style.display=\'none\'">'
    +'<div class="dtWrap"><div class="dtTitle">'+esc(title)+'</div><div class="dtArtist">'+esc(artist)+'</div>'
    +'<div class="dtActs"><button class="dtBtn yt" id="dtYT">▶ 유튜브</button><button class="dtBtn ym" id="dtYM">🎵 유튜브 뮤직</button><button class="dtBtn inside" id="dtIN">▣ 이 화면</button></div>'
    +'<div id="dtExtra"><div class="dtDescT">정보 불러오는 중…</div></div></div>';
  $('dtBody').innerHTML=head;
  $('dtBody').scrollTop=0;
  $('dtSheet').classList.add('show');
  try{
    const d=await ytFetch('videos',{ part:'snippet,statistics', id:vid });
    const it=(d.items||[])[0];
    if(!it){ $('dtExtra').innerHTML='<div class="dtDescT">정보를 찾지 못했어요.</div>'; return; }
    const sn=it.snippet||{}, st=it.statistics||{};
    const big=(sn.thumbnails&&(sn.thumbnails.maxres||sn.thumbnails.standard||sn.thumbnails.high)||{}).url;
    if(big) $('dtBody').querySelector('.dtImg').src=big;
    let chips='';
    if(sn.channelTitle) chips+='<span class="dtChip">'+esc(sn.channelTitle.replace(/ - Topic$/,''))+'</span>';
    if(sn.publishedAt) chips+='<span class="dtChip">'+sn.publishedAt.slice(0,10).replace(/-/g,'.')+'</span>';
    if(st.viewCount) chips+='<span class="dtChip">조회 '+fmtNum(st.viewCount)+'</span>';
    const desc=(sn.description||'').trim();
    $('dtExtra').innerHTML=(chips?'<div class="dtMeta">'+chips+'</div>':'')
      +'<div class="dtDescT">설명</div>'
      +'<div class="dtDesc">'+(desc?esc(desc):'설명이 없어요.')+'</div>';
  }catch(err){ $('dtExtra').innerHTML='<div class="dtDescT">정보를 불러오지 못했어요.</div>'; }
}
$('dtClose').addEventListener('click',()=>$('dtSheet').classList.remove('show'));
$('dtBody').addEventListener('click',e=>{
  if(!dtCur) return;
  if(e.target.closest('#dtYT')){ recordPlay(dtCur.vid,dtCur.title,dtCur.artist,dtCur.thumb,dtCur.genre); goYT(dtCur.vid,dtCur.plid); }
  else if(e.target.closest('#dtYM')){ recordPlay(dtCur.vid,dtCur.title,dtCur.artist,dtCur.thumb,dtCur.genre); goYM(dtCur.vid); }
  else if(e.target.closest('#dtIN')){ recordPlay(dtCur.vid,dtCur.title,dtCur.artist,dtCur.thumb,dtCur.genre); playInside(dtCur.vid,dtCur.title,dtCur.artist,dtCur.plid); }
});

document.addEventListener('click',e=>{
  const card=e.target.closest('.plCard');
  if(card){ openPlaylist(card.dataset.plid, card.dataset.title); return; }
  const row=e.target.closest('.rankRow, .chartTop');
  if(!row || !row.dataset.vid) return;
  const vid=row.dataset.vid, title=row.dataset.title||'', artist=row.dataset.artist||'', thumb=row.dataset.thumb||'';
  // ▶ 빨강 = 유튜브 (재생목록 이어재생)
  if(e.target.closest('.bYT')){ recordPlay(vid,title,artist,thumb,ctxGenre(row)); goYT(vid, ctxPlid(row)); return; }
  // 🎵 흰색 = 유튜브 뮤직 (한 곡)
  if(e.target.closest('.bYM')){ recordPlay(vid,title,artist,thumb,ctxGenre(row)); goYM(vid); return; }
  // ▣ 테두리 = 현재 화면 안에서 재생
  if(e.target.closest('.bIN')){ recordPlay(vid,title,artist,thumb,ctxGenre(row)); playInside(vid,title,artist,ctxPlid(row)); return; }
  // 그 외 줄 탭 = 곡 상세 (앱 안에서 보기)
  openDetail(vid,title,artist,thumb, ctxPlid(row), ctxGenre(row));
});
$('pmOpen').addEventListener('click',()=>{ const plid=$('pmOpen').dataset.plid; if(plid)openPlaylistInMusic(plid); });
$('plModalClose').addEventListener('click',()=>$('plModal').classList.remove('show'));
$('songSortBtn').addEventListener('click',()=>{
  // 탭할 때마다: 방향 뒤집기 -> 다음 정렬로 (원래▼→원래▲→가수▼→가수▲→들은▼→들은▲→원래▼…)
  const st=getSongSort();
  let next;
  if(!st.desc) next={mode:st.mode,desc:true};
  else{
    const order=['orig','artist','played'];
    next={mode:order[(order.indexOf(st.mode)+1)%order.length],desc:false};
  }
  Store.set('songSort', next); renderSongList();
});
// 모달 좌우 스와이프로 닫기 (세로 스크롤 오인 방지 게이트 적용)
let mTouchX=null, mTouchY=null;
$('plModal').addEventListener('touchstart',e=>{ mTouchX=e.touches[0].clientX; mTouchY=e.touches[0].clientY; },{passive:true});
$('plModal').addEventListener('touchend',e=>{
  if(mTouchX===null)return;
  const dx=e.changedTouches[0].clientX-mTouchX;
  const dy=e.changedTouches[0].clientY-mTouchY;
  mTouchX=null; mTouchY=null;
  if(Math.abs(dx)<70) return;
  if(Math.abs(dx)<Math.abs(dy)*1.5) return;
  $('plModal').classList.remove('show');
},{passive:true});
// 달력 시트: ‹ 버튼 + 좌우 스와이프로 닫기
$('calClose').addEventListener('click',()=>$('calSheet').classList.remove('show'));
let cTouchX=null, cTouchY=null;
$('calSheet').addEventListener('touchstart',e=>{ cTouchX=e.touches[0].clientX; cTouchY=e.touches[0].clientY; },{passive:true});
$('calSheet').addEventListener('touchend',e=>{
  if(cTouchX===null)return;
  const dx=e.changedTouches[0].clientX-cTouchX;
  const dy=e.changedTouches[0].clientY-cTouchY;
  cTouchX=null; cTouchY=null;
  if(Math.abs(dx)<70) return;
  if(Math.abs(dx)<Math.abs(dy)*1.5) return;

$('dtSheet').addEventListener('touchstart',e=>{ dTouchX=e.touches[0].clientX; dTouchY=e.touches[0].clientY; },{passive:true});
$('dtSheet').addEventListener('touchend',e=>{
  if(dTouchX===null)return;
  const dx=e.changedTouches[0].clientX-dTouchX;
  const dy=e.changedTouches[0].clientY-dTouchY;
  dTouchX=null; dTouchY=null;
  if(Math.abs(dx)<70) return;

/* 좌우 스와이프 — 순위(한국/미국) + 내 순위(전체/월간/주간) */
let touchX=null, touchY=null;
$('content').addEventListener('touchstart',e=>{
  if(currentTab==='chart'||currentTab==='mychart'){
    touchX=e.touches[0].clientX; touchY=e.touches[0].clientY;
  }
},{passive:true});
$('content').addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  const dy=e.changedTouches[0].clientY-touchY;
  touchX=null; touchY=null;
  // 수평 이동이 충분히 크고, 수직 이동보다 우세할 때만 전환 (세로 스크롤 오인 방지)
  if(Math.abs(dx)<60) return;
  if(Math.abs(dx)<Math.abs(dy)*1.5) return;
  const dir=dx<0?1:-1; // 왼쪽으로 밀면 다음
  if(currentTab==='chart'){
    const order=['KR','GL'];
    let idx=order.indexOf(getRegion());
    idx=(idx+dir+order.length)%order.length; // 순환
    Store.set('region',order[idx]); renderChart();
  } else if(currentTab==='mychart'){
    const order=['year','month','week'];
    let idx=order.indexOf(getMyPeriod());
    idx=(idx+dir+order.length)%order.length; // 순환
    Store.set('myPeriod',order[idx]); renderMyChart();
  }
},{passive:true});
function errorHtml(err){
  if(err.noKey) return '<div class="secError"><b>API 키가 필요해요.</b><br>\u2699 설정에서 키를 넣어주세요.</div>';
  if(err.api){
    const reason=(err.api.errors&&err.api.errors[0]&&err.api.errors[0].reason)||'';
    if(reason==='quotaExceeded') return '<div class="secError">오늘 사용량을 다 썼어요. 내일 자정에 다시 채워져요.</div>';
    if(reason==='keyInvalid'||reason==='badRequest') return '<div class="secError"><b>API 키가 올바르지 않아요.</b><br>\u2699 설정에서 다시 확인해주세요.</div>';
    return '<div class="secError">오류: '+esc(err.api.message||'알 수 없음')+'</div>';
  }
  return '<div class="secError">인터넷 연결을 확인해주세요.</div>';
}
$('refreshBtn').addEventListener('click',()=>{ toast('새로고침'); renderTab(); });
$('setBtn').addEventListener('click',openSettings);
$('setClose').addEventListener('click',()=>$('setModal').classList.remove('show'));
function openSettings(){
  $('apiKeyInput').value=getApiKey();
  renderSavedPls();
  $('setModal').classList.add('show');
}
$('saveKeyBtn').addEventListener('click',()=>{
  const k=$('apiKeyInput').value.trim();
  Store.set('apiKey',k);
  toast(k?'API 키 저장됨':'키를 비웠어요');
  if(k){ $('setModal').classList.remove('show'); renderTab(); }
});
$('reloadBtn').addEventListener('click',()=>{ $('setModal').classList.remove('show'); renderTab(); });
$('clearHistBtn').addEventListener('click',()=>{
  if(confirm('내 순위 기록을 모두 지울까요? 되돌릴 수 없어요.')){
    Store.set('playHistory',[]); toast('내 순위 기록 초기화됨');
    if(currentTab==='mychart') renderMyChart();

});
// ── 백업 / 복원 ──
$('exportBtn').addEventListener('click',()=>{
  const data={
    v:1,
    myPls:getMyPls(), offPls:getOffPls(), perPls:getPerPls(),
    apiKey:getApiKey()
  };
  const text=JSON.stringify(data);
  $('backupBox').value=text;
  // 클립보드 복사 시도
  try{

      navigator.clipboard.writeText(text).then(()=>toast('복사됐어요 · 메모장에 붙여두세요'),()=>toast('아래 칸을 길게 눌러 복사하세요'));
    } else {
      $('backupBox').select(); document.execCommand('copy'); toast('복사됐어요 · 메모장에 붙여두세요');
    }
  }catch(e){ toast('아래 칸을 길게 눌러 복사하세요'); }
});
$('importBtn').addEventListener('click',()=>{
  const raw=$('backupBox').value.trim();
  if(!raw){ toast('복원할 내용을 붙여넣어주세요'); return; }
  let data;
  try{ data=JSON.parse(raw); }catch(e){ toast('백업 내용 형식이 올바르지 않아요'); return; }
  if(!data || (!data.myPls && !data.offPls && !data.perPls)){ toast('백업 내용을 알아볼 수 없어요'); return; }
  if(!confirm('지금 저장된 재생목록을 백업 내용으로 덮어쓸까요?')) return;
  if(Array.isArray(data.myPls)) Store.set('myPls',data.myPls);
  if(Array.isArray(data.offPls)) Store.set('offPls',data.offPls);
  if(Array.isArray(data.perPls)) Store.set('perPls',data.perPls);
  if(typeof data.apiKey==='string' && data.apiKey) Store.set('apiKey',data.apiKey);
  $('apiKeyInput').value=getApiKey();
  renderSavedPls(); toast('복원됐어요 · 적용 누르면 보여요');
});

$('offPlAdd').addEventListener('click',()=>addPl('offPls','offPlInput',DEFAULT_OFFICIAL));
$('perPlAdd').addEventListener('click',()=>addPl('perPls','perPlInput',DEFAULT_PERIOD));
function addPl(storeKey,inputId,def){
  const url=$(inputId).value.trim();
  const id=extractPlaylistId(url);
  if(!id){ toast('재생목록 링크가 아니에요'); return; }
  const cur=Store.get(storeKey,def).slice();
  if(cur.some(p=>extractPlaylistId(p.url)===id)){ toast('이미 있어요'); return; }
  cur.push({url,addedAt:Date.now()}); Store.set(storeKey,cur);
  $(inputId).value=''; renderSavedPls(); toast('추가됨 · 적용 누르면 보여요');
}
function renderSavedPls(){
  $('myPlList').innerHTML=getMyPls().map((p,i)=>savedRow(p,i,'my')).join('')||'<div class="setHelp">없음</div>';
  $('offPlList').innerHTML=getOffPls().map((p,i)=>savedRow(p,i,'off')).join('')||'<div class="setHelp">없음</div>';
  $('perPlList').innerHTML=getPerPls().map((p,i)=>savedRow(p,i,'per')).join('')||'<div class="setHelp">없음</div>';
}
function savedRow(p,i,kind){
  const id=extractPlaylistId(p.url)||'?';
  return '<div class="savedPl"><span class="spName">'+esc(id)+'</span><button class="spDel" data-kind="'+kind+'" data-i="'+i+'">×</button></div>';
}
$('myPlList').addEventListener('click',e=>delPl(e,'myPls',DEFAULT_MY));
$('offPlList').addEventListener('click',e=>delPl(e,'offPls',DEFAULT_OFFICIAL));
$('perPlList').addEventListener('click',e=>delPl(e,'perPls',DEFAULT_PERIOD));
function delPl(e,storeKey,def){
  const btn=e.target.closest('.spDel'); if(!btn)return;
  const i=+btn.dataset.i; const cur=Store.get(storeKey,def).slice();
  cur.splice(i,1); Store.set(storeKey,cur); renderSavedPls(); toast('삭제됨');
}
function cleanTitle(t){
  return String(t).replace(/\(Official.*?\)/gi,'').replace(/\[Official.*?\]/gi,'')
    .replace(/\(M\/V\)/gi,'').replace(/\(MV\)/gi,'').replace(/\(Audio\)/gi,'')
    .replace(/\(Lyric.*?\)/gi,'').replace(/M\/V/g,'').trim();
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
let toastT;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1500);}
pruneHistory();
renderTab();
